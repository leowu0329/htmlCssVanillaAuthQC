<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-4">
        <div class="card shadow border-0">
            <div class="card-body p-4">
                <h3 class="text-center mb-4"><i class="bi bi-person-plus-fill text-success me-2"></i>帳號註冊</h3>
                <form id="signup-form">
                    <div class="mb-3">
                        <label class="form-label">電子郵件 (Email)</label>
                        <input type="email" id="signup-email" class="form-control" required placeholder="name@company.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密碼 (Password)</label>
                        <div class="input-group">
                            <input type="password" id="signup-password" class="form-control" required minlength="6">
                            <span class="input-group-text" style="cursor: pointer;">
                                <i class="bi bi-eye-slash" id="toggle-signup-password"></i>
                            </span>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 mt-2">建立帳號</button>
                </form>
                <div class="text-center mt-3">
                    <small>已有帳號？ <a href="#login" class="text-decoration-none">返回登入</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
