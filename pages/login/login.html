<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-4">
        <div class="card shadow border-0">
            <div class="card-body p-4">
                <h3 class="text-center mb-4"><i class="bi bi-shield-lock-fill text-primary me-2"></i>系統登入</h3>
                <form id="login-form">
                    <div class="mb-3">
                        <label class="form-label">電子郵件 (Email)</label>
                        <input type="email" id="login-email" class="form-control" required placeholder="name@company.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密碼 (Password)</label>
                        <div class="input-group">
                            <input type="password" id="login-password" class="form-control" required>
                            <span class="input-group-text" style="cursor: pointer;">
                                <i class="bi bi-eye-slash" id="toggle-login-password"></i>
                            </span>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 mt-2">登入</button>
                </form>
                <div class="text-center mt-3">
                    <small>還沒有帳號？ <a href="#signup" class="text-decoration-none">立即註冊</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
